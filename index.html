function getNextRefUrlForCategory(category, settings = state.settings) {
  const refUrls = settings.refUrls || state.settings.refUrls || {};
  const categoryPool = sanitizeAutoRefUrls(refUrls[category]);
  const key = categoryPool.length ? category : "beauty";
  const pool = key === category ? categoryPool : sanitizeAutoRefUrls(refUrls.beauty || DEFAULT_REF_URLS.beauty);
  if (!pool.length) return "";
  if (!state.refQueues[key] || !state.refQueues[key].length) {
    state.refQueues[key] = shuffle([...pool]);
  }
  return state.refQueues[key].pop();
}

function shuffle(values) {
  for (let i = values.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [values[i], values[j]] = [values[j], values[i]];
  }
  return values;
}

async function callImageApi(payload) {
  if ((payload.engine || state.generationEngine) === "gpt") return callGptImageApi(payload);
  return callNanoImageApi(payload);
}

async function callNanoImageApi(payload) {
  const settings = payload.settings || state.settings;
  const imageUrl = getProxyApiUrl(settings.apiGenUrl);
  if (!settings.apiKey || !imageUrl) throw new Error("API 配置不完整");
  const parts = [];
  for (const url of payload.urls || []) {
    const part = dataUrlToInlinePart(url);
    if (part) parts.push(part);
  }
  const ratio = ASPECT_RATIOS.includes(payload.aspectRatio) ? payload.aspectRatio : "3:4";
  const ratioInstruction = `\n\n[OUTPUT FORMAT - HIGHEST PRIORITY] The output image MUST use strict ${ratio} aspect ratio (${ASPECT_RATIO_COPY[ratio]}). Do NOT output any other aspect ratio.`;
  parts.push({ text: `${payload.prompt || ""}${ratioInstruction}` });

  const generationConfig = getNanoImageGenerationConfig(ratio, imageUrl);
  const result = await callGenerateContent(imageUrl, parts, settings.apiKey, generationConfig);
  const image = extractGeneratedImageFromJson(result);
  if (image) return image;

  const retryParts = parts.map((part, index) => {
    if (index !== parts.length - 1 || !part.text) return part;
    return {
      text: `${part.text}\n\n[IMAGE OUTPUT REQUIRED]\nReturn exactly one generated image. Do not respond with text-only analysis, refusal, caption, or instructions.`
    };
  });
  const retryResult = await callGenerateContent(imageUrl, retryParts, settings.apiKey, generationConfig);
  const retryImage = extractGeneratedImageFromJson(retryResult);
  if (retryImage) return retryImage;

  const reason = getNoImageResponseMessage(retryResult) || getNoImageResponseMessage(result);
  throw new Error(reason ? `API 未返回图片：${reason}` : "API 未返回图片");
}

function extractGeneratedImageFromJson(result) {
  for (const part of getResultParts(result)) {
    const inline = part.inlineData || part.inline_data || part.image || part.generatedImage;
    const image = normalizeGeneratedImageValue(inline?.data || inline?.b64_json || inline?.base64, inline?.mimeType || inline?.mime_type);
    if (image) return image;
    const url = normalizeGeneratedImageValue(part.fileData?.fileUri || part.file_data?.file_uri || inline?.url || part.url);
    if (url) return url;
  }

  const containers = [
    ...(Array.isArray(result?.data) ? result.data : []),
    ...(Array.isArray(result?.images) ? result.images : []),
    ...(Array.isArray(result?.generatedImages) ? result.generatedImages : []),
    result?.image
  ].filter(Boolean);
  for (const item of containers) {
    const image = normalizeGeneratedImageValue(
      item.b64_json || item.base64 || item.data || item.url,
      item.mimeType || item.mime_type
    );
    if (image) return image;
  }
  return "";
}

function getResultParts(result) {
  const candidates = Array.isArray(result?.candidates) ? result.candidates : [];
  return candidates.flatMap((candidate) => {
    const parts = candidate?.content?.parts || candidate?.message?.content || candidate?.parts || [];
    return Array.isArray(parts) ? parts : [];
  });
}

function normalizeGeneratedImageValue(value, mimeType = "image/png") {
  if (!value || typeof value !== "string") return "";
  const cleaned = value.trim();
  if (/^data:image\//i.test(cleaned) || /^https?:\/\//i.test(cleaned)) return cleaned;
  if (cleaned.length < 1000 || /[^A-Za-z0-9+/=\s]/.test(cleaned)) return "";
  return `data:${mimeType || "image/png"};base64,${cleaned.replace(/\s/g, "")}`;
}

function getNoImageResponseMessage(result) {
  const gatewayError = getGatewayError(result);
  if (gatewayError) return gatewayError;
  const candidate = result?.candidates?.[0] || {};
  const texts = getResultParts(result)
    .map((part) => part.text || part.output_text || "")
    .filter(Boolean)
    .join(" ")
    .trim();
  const finish = candidate.finishReason || result?.finishReason || "";
  const block = result?.promptFeedback?.blockReason || candidate?.safetyRatings?.find?.((item) => item.blocked)?.category || "";
  return [
    block ? `被安全策略拦截：${block}` : "",
    finish && finish !== "STOP" ? `结束原因：${finish}` : "",
    texts ? `文本回复：${texts.slice(0, 160)}` : ""
  ].filter(Boolean).join("；");
}

async function callGptImageApi(payload) {
  const settings = payload.settings || state.settings;
  const imageUrl = settings.gptEditUrl;
  if (!settings.gptApiKey || !imageUrl) throw new Error("GPT API 配置不完整");

  const primaryKey = settings.gptApiKey;
  try {
    return await callGptImageApiWithKey(payload, primaryKey);
  } catch (error) {
    const fallbackKey = DEFAULT_API_CONFIG.gptFallbackApiKey;
    if (fallbackKey && fallbackKey !== primaryKey && isUnsupportedGptImageKeyError(error)) {
      console.warn("当前 GPT Key 不支持图片编辑，切换图片生图 Key 重试。", error);
      return callGptImageApiWithKey(payload, fallbackKey);
    }
    throw error;
  }
}

async function callGptImageApiWithKey(payload, apiKey) {
  const settings = payload.settings || state.settings;
  const imageUrl = settings.gptEditUrl;
  const urls = (payload.urls || []).filter((url) => url?.startsWith("data:"));
  if (!urls.length) throw new Error("GPT 生成需要至少一张输入图");

  const retryDelays = [8000, 16000, 24000];
  for (let attempt = 0; attempt <= retryDelays.length; attempt += 1) {
    const response = await fetch(imageUrl, {
      method: "POST",
      headers: createApiAuthHeaders(imageUrl, apiKey),
      body: createGptImageFormData(payload, urls)
    });
    const result = await response.json().catch(() => ({}));
    const gatewayError = getGatewayError(result);
    if (response.ok && !gatewayError) {
      const image = result?.data?.[0];
      if (image?.b64_json) return `data:image/png;base64,${image.b64_json}`;
      if (image?.url) return image.url;
      throw new Error("GPT API 未返回图片");
    }
    const message = gatewayError || `HTTP ${response.status}`;
    const retryable = response.status === 429 || response.status === 503 || /EngineOverloaded|high demand|overloaded|temporar/i.test(message);
    if (retryable && attempt < retryDelays.length) {
      await wait(retryDelays[attempt]);
      continue;
    }
    throw new Error(`GPT API错误: ${message}`);
  }
  throw new Error("GPT API错误");
}

function createGptImageFormData(payload, urls) {
  const form = new FormData();
  const imageFieldName = urls.length > 1 ? "image[]" : "image";

  urls.forEach((url, index) => {
    const blob = dataUrlToBlob(url);
    if (blob) form.append(imageFieldName, blob, `scene-input-${index + 1}.${mimeToExt(blob.type)}`);
  });

  const ratio = ASPECT_RATIOS.includes(payload.aspectRatio) ? payload.aspectRatio : "3:4";
  const ratioInstruction = `\n\n[OUTPUT FORMAT - HIGHEST PRIORITY] The output image MUST use strict ${ratio} aspect ratio (${ASPECT_RATIO_COPY[ratio]}). Do NOT output any other aspect ratio.`;
  form.append("model", GPT_IMAGE_MODEL);
  form.append("prompt", `${payload.prompt || ""}${ratioInstruction}`);
  form.append("n", "1");
  form.append("size", getGptImageSize(ratio));
  form.append("quality", "high");
  return form;
}

function getNanoImageGenerationConfig(ratio, imageUrl) {
  const image = { aspectRatio: ratio };
  if (/\/gemini-3(?:\.1)?-|\/gemini-3-pro/i.test(imageUrl)) image.imageSize = "2K";
  return {
    responseModalities: ["TEXT", "IMAGE"],
    imageConfig: image
  };
}

function getGatewayError(result) {
  if (!result || typeof result !== "object") return "";
  if (result.Code || result.code) {
    return result.Error || result.message || result?.error?.message || "API returned business error";
  }
  if (typeof result.error === "string") return result.error;
  return result?.error?.message || "";
}

function isUnsupportedGptImageKeyError(error) {
  return /OperationNotSupported|does not work with the specified model|gpt-5\.2/i.test(error?.message || "");
}

function normalizeImageToAspectRatio(dataUrl, ratio) {
  if (!dataUrl || !ASPECT_RATIO_OUTPUT_SIZE[ratio]) return Promise.resolve(dataUrl);
  return new Promise((resolve) => {
    const image = new Image();
    image.onload = () => {
      const [targetWidth, targetHeight] = ASPECT_RATIO_OUTPUT_SIZE[ratio];
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      if (!ctx) {
        resolve(dataUrl);
        return;
      }

      const sourceWidth = image.naturalWidth || image.width;
      const sourceHeight = image.naturalHeight || image.height;
      const sourceRatio = sourceWidth / sourceHeight;
      const targetRatio = targetWidth / targetHeight;
      let sx = 0;
      let sy = 0;
      let sw = sourceWidth;
      let sh = sourceHeight;

      if (sourceRatio > targetRatio) {
        sw = sourceHeight * targetRatio;
        sx = (sourceWidth - sw) / 2;
      } else if (sourceRatio < targetRatio) {
        sh = sourceWidth / targetRatio;
        sy = (sourceHeight - sh) / 2;
      }

      canvas.width = targetWidth;
      canvas.height = targetHeight;
      ctx.drawImage(image, sx, sy, sw, sh, 0, 0, targetWidth, targetHeight);
      resolve(canvas.toDataURL("image/png"));
    };
    image.onerror = () => resolve(dataUrl);
    image.src = dataUrl;
  });
}

// 抠图引擎：@imgly/background-removal。模块与模型都走本地代理，避免浏览器跨域下载失败。
const BG_REMOVAL_MODULE = "./npm/@imgly/background-removal@1.7.0/+esm";
const BG_REMOVAL_PUBLIC_PATH = new URL("./bg-removal/", location.href).href;
let bgRemoverPromise = null;

function loadBgRemover() {
  if (!bgRemoverPromise) {
    bgRemoverPromise = import(BG_REMOVAL_MODULE)
      .then((module) => module.removeBackground || module.default)
      .catch((error) => {
        bgRemoverPromise = null;
        throw error;
      });
  }
  return bgRemoverPromise;
}

async function removeImageBackground(source, onProgress) {
  const removeBackground = await loadBgRemover();
  if (typeof removeBackground !== "function") throw new Error("抠图模块加载异常");
  const blob = await removeBackground(source, {
    model: "small",
    publicPath: BG_REMOVAL_PUBLIC_PATH,
    ...(onProgress ? { progress: onProgress } : {})
  });
  return readFileAsDataUrl(blob);
}

function makeWhiteBg(transparentDataUrl) {
  if (!transparentDataUrl) return Promise.resolve("");
  return new Promise((resolve) => {
    const image = new Image();
    image.onload = () => {
      const width = image.naturalWidth || image.width;
      const height = image.naturalHeight || image.height;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      if (!ctx || !width || !height) {
        resolve(transparentDataUrl);
        return;
      }
      canvas.width = width;
      canvas.height = height;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, width, height);
      ctx.drawImage(image, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", 0.92));
    };
    image.onerror = () => resolve(transparentDataUrl);
    image.src = transparentDataUrl;
  });
}

async function cutoutItem(index, options = {}) {
  const item = state.items[index];
  if (!item || item.cutoutStatus === "processing") return false;
  item.cutoutStatus = "processing";
  item.cutoutError = "";
  renderCardAt(index);
  await waitForPaint();
  try {
    const source = item.file || (await ensureItemDataUrl(item));
    if (!source) throw new Error("缺少原图");
    const transparentUrl = await removeImageBackground(source, (key, current, total) => {
      if (/fetch|download/i.test(String(key)) && total) {
        const pct = Math.min(100, Math.round((current / total) * 100));
        setTask(`抠图模型 ${pct}%`, options.done || 0, options.total || 1, true);
      }
    });
    const whiteUrl = await makeWhiteBg(transparentUrl);
    revokeObjectUrl(item.cutoutObjectUrl);
    revokeObjectUrl(item.cutoutWhiteObjectUrl);
    item.cutoutUrl = transparentUrl;
    item.cutoutObjectUrl = dataUrlToObjectUrl(transparentUrl);
    item.cutoutWhiteUrl = whiteUrl;
    item.cutoutWhiteObjectUrl = dataUrlToObjectUrl(whiteUrl);
    item.cutoutThumbUrl = "";
    item.cutoutWhiteThumbUrl = "";
    item.cutoutStatus = "";
    renderCardAt(index);
    await waitForPaint();
    item.cutoutThumbUrl = await createPreviewThumbnail(transparentUrl, CARD_THUMBNAIL_SIZE, "image/png");
    item.cutoutWhiteThumbUrl = await createPreviewThumbnail(whiteUrl, CARD_THUMBNAIL_SIZE);
    renderCardAt(index);
    if (dom.previewOverlay.classList.contains("is-open") && state.preview.itemIndex === index) {
      setPreviewImage(state.preview.imageIndex);
    }
    return true;
  } catch (error) {
    item.cutoutStatus = "error";
    item.cutoutError = error?.message || "抠图失败";
    console.error("抠图失败", error);
    renderCardAt(index);
    if (!options.silent) {
      window.alert(`抠图失败：${item.cutoutError}\n首次使用需联网下载模型，请检查网络后重试。`);
    }
    return false;
  }
}

async function cutoutOne(index, options = {}) {
  const item = state.items[index];
  if (!item || item.cutoutStatus === "processing") return;
  if (!options.keepBusy) setTask("抠图中", 0, 1, true);

async function cutoutAll() {
  if (state.busy) return;
  const indices = state.items
    .map((item, index) => ({ item, index }))
    .filter(({ item }) => item && item.cutoutStatus !== "processing")
    .map(({ index }) => index);
  if (!indices.length) return;

  state.busy = true;
  let finished = 0;
  setTask("抠图中", finished, indices.length, true);
  updateCounts();
  await runWithConcurrency(indices, 1, async (index) => {
    await cutoutItem(index, { silent: true, done: finished, total: indices.length });
    finished += 1;
    setTask(finished >= indices.length ? "完成" : "抠图中", finished, indices.length, finished < indices.length);
    await waitForPaint();
  });
  state.busy = false;
  setTask("完成", finished, indices.length);
  updateCounts();
}

async function callGenerateContent(url, parts, apiKey = state.settings.apiKey, generationConfig = {}) {
  const body = JSON.stringify({
    contents: [{ role: "user", parts }],
    generationConfig: { temperature: 0.35, topP: 0.8, ...generationConfig },
    safetySettings: SAFETY_SETTINGS
  });
  const retryDelays = [8000, 16000, 24000];
  for (let attempt = 0; attempt <= retryDelays.length; attempt += 1) {
    console.info("Scene Lab 生图请求", { url, attempt: attempt + 1 });
    let response;
    try {
      response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json", ...createApiAuthHeaders(url, apiKey) },
        body
      });
    } catch (error) {
      const proxyHint = /^https?:\/\/[^/]+\.lhr\.life/i.test(url)
        ? "公网代理不可用或已换地址，请重启后端代理。"
        : /newapi\.bananapro\.top/i.test(url)
          ? "上游 API 无法连接，请检查网络或 API 服务状态。"
        : "请检查网络或本地代理。";
      throw new Error(`网络请求失败: ${proxyHint} ${error?.message || error}`);
    }
    const result = await response.json().catch(() => ({}));
    if (response.ok) return result;
    const message = result?.error?.message || `HTTP ${response.status}`;
    const retryable = response.status === 503 || /high demand|overloaded|temporar/i.test(message);
    if (retryable && attempt < retryDelays.length) {
      await wait(retryDelays[attempt]);
      continue;
    }
    throw new Error(`API错误: ${message}`);
  }
  throw new Error("API错误");
}

function createApiAuthHeaders(url, apiKey) {
  const key = String(apiKey || "").trim();
  if (!key) return {};
  if (isBearerApiUrl(url) || isOpenAiImagesUrl(url)) return { Authorization: `Bearer ${key}` };
  if (/generativelanguage\.googleapis\.com/i.test(url)) return { "x-goog-api-key": key };
  return { "api-key": key };
}

function isBearerApiUrl(url) {
  const origin = getUrlOrigin(url);
  return [NEWAPI_CHANNEL_CONN.url, GPTAPI_CHANNEL_CONN.url].some((baseUrl) => origin === getUrlOrigin(baseUrl));
}

function isOpenAiImagesUrl(url) {
  try {
    const parsed = new URL(url);
    return /(^|\.)openai\.com$/i.test(parsed.hostname) && parsed.pathname.startsWith("/v1/images/");
  } catch (error) {
    return false;
  }
}

function getUrlOrigin(url) {
  try {
    return new URL(url).origin;
  } catch (error) {
    return "";
  }
}

function dataUrlToInlinePart(url) {
  if (!url || !url.startsWith("data:") || !url.includes(";base64,")) return null;
  const [prefix, data] = url.split(";base64,");
  const mimeType = prefix.split(":")[1] || "image/png";
  return { inlineData: { mimeType, data } };
}

function dataUrlToBlob(url) {
  if (!url || !url.startsWith("data:") || !url.includes(";base64,")) return null;
  const [prefix, data] = url.split(";base64,");
  const mimeType = prefix.split(":")[1] || "image/png";
  const binary = atob(data);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i += 1) {
    bytes[i] = binary.charCodeAt(i);
  }
  return new Blob([bytes], { type: mimeType });
}

function dataUrlToObjectUrl(url) {
  if (!url?.startsWith("data:")) return url || "";
  const blob = dataUrlToBlob(url);
  return blob ? URL.createObjectURL(blob) : url;
}

function revokeObjectUrl(url) {
  if (url?.startsWith("blob:")) URL.revokeObjectURL(url);
}

function disposeVariant(variant) {
  if (variant && typeof variant === "object") revokeObjectUrl(variant.objectUrl);
}

function disposeItem(item) {
  if (!item) return;
  revokeObjectUrl(item.objectUrl);
  revokeObjectUrl(item.outputObjectUrl);
  revokeObjectUrl(item.cutoutObjectUrl);
  revokeObjectUrl(item.cutoutWhiteObjectUrl);
  item.variants.forEach(disposeVariant);
}

function disposeReference(ref) {
  if (!ref) return;
  revokeObjectUrl(ref.objectUrl);
}

function mimeToExt(mimeType) {
  if (/jpe?g/i.test(mimeType)) return "jpg";
  if (/webp/i.test(mimeType)) return "webp";
  return "png";
}

function getGptImageSize(ratio) {
  if (ratio === "3:4") return "1200x1600";
  if (ratio === "16:9" || ratio === "4:3") return "1536x1024";
  if (ratio === "9:16") return "1024x1536";
  return "1024x1024";
}

async function imageUrlToDataUrl(url) {
  const response = await fetch(url);
  if (!response.ok) throw new Error(`参考图读取失败: ${response.status}`);
  const blob = await response.blob();
  return await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function wait(ms) {
  return new Promise((resolve) => window.setTimeout(resolve, ms));
}

function downloadUrl(url, fileName) {
  const link = document.createElement("a");
  link.href = url;
  link.download = fileName;
  document.body.appendChild(link);
  link.click();
  link.remove();
}

async function downloadAll() {
  const downloads = [];
  state.items.forEach((item, index) => {
    const baseName = sanitizeFileName(item.name);
    if (item.outputUrl) downloads.push([item.outputUrl, `${index + 1}-${baseName}-main.png`]);
    item.variants.forEach((url, variantIndex) => {
      downloads.push([getVariantUrl(url), `${index + 1}-${baseName}-${getVariantLabel(url, variantIndex)}.png`]);
    });
    if (item.cutoutUrl) downloads.push([item.cutoutUrl, `${index + 1}-${baseName}-抠图-透明.png`]);
    if (item.cutoutWhiteUrl) downloads.push([item.cutoutWhiteUrl, `${index + 1}-${baseName}-抠图-白底.jpg`]);
  });
  if (!downloads.length) return;
  if (IS_TOUCH_APPLE && (await shareImages(downloads))) return;
  for (const [url, fileName] of downloads) {
    downloadUrl(url, fileName);
    await wait(90);
  }
}

const IS_TOUCH_APPLE =
  /iP(hone|ad|od)/.test(navigator.userAgent) ||
  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

async function shareImages(downloads) {
  if (typeof navigator.share !== "function" || typeof navigator.canShare !== "function") return false;
  const files = downloads
    .map(([url, fileName]) => {
      const blob = dataUrlToBlob(url);
      return blob ? new File([blob], fileName, { type: blob.type }) : null;
    })
    .filter(Boolean);
  if (!files.length || !navigator.canShare({ files })) return false;
  try {
    await navigator.share({ files });
    return true;
  } catch (error) {
    if (error?.name === "AbortError") return true;
    // iOS 上批量过大可能超出手势时效（NotAllowedError）；逐个 <a download> 在
    // 主屏 App 里基本无效，提示用户替代路径，避免无声失败。
    window.alert("一次保存的图片太多，系统拒绝了分享。请减少数量后重试，或在大图预览里长按单张保存。");
    return true;
  }
}

function saveAdmin() {

function resetAdmin() {
  if (CATEGORY_KEYS.includes(state.activeAdminTab)) {
    state.settings.refUrls[state.activeAdminTab] = [...DEFAULT_REF_URLS[state.activeAdminTab]];
    state.refQueues[state.activeAdminTab] = [];
  } else if (state.activeAdminTab === "prompt") {
    state.settings.promptMain = DEFAULT_PROMPTS.main;
    state.settings.promptMainFallback = DEFAULT_PROMPTS.mainFallback;
    state.settings.promptVariantOverhead = DEFAULT_PROMPTS.variantOverhead;
    state.settings.promptVariantDetail = DEFAULT_PROMPTS.variantDetail;
    state.settings.promptVariantSide = DEFAULT_PROMPTS.variantSide;
  } else if (state.activeAdminTab === "api") {
    state.settings.apiKey = DEFAULT_API_CONFIG.apiKey;
    state.settings.apiGenUrl = DEFAULT_API_CONFIG.apiGenUrl;
    state.settings.gptApiKey = DEFAULT_API_CONFIG.gptApiKey;
    state.settings.gptEditUrl = DEFAULT_API_CONFIG.gptEditUrl;
  }
  persistSettings();
  fillAdminForm();

function switchAdminTab(tab) {
  state.activeAdminTab = tab;
  document.querySelectorAll(".admin-tab").forEach((button) => {
    button.classList.toggle("active", button.dataset.tab === tab);
  });
  document.querySelectorAll(".admin-pane").forEach((pane) => {
    const isRefPane = pane.dataset.pane === "refs" && CATEGORY_KEYS.includes(tab);
    pane.classList.toggle("active", isRefPane || pane.dataset.pane === tab);
  });
  renderAdminRefs();
}

function renderAdminRefs() {
  if (!CATEGORY_KEYS.includes(state.activeAdminTab)) return;
  const key = state.activeAdminTab;
  const urls = state.settings.refUrls[key] || [];
  dom.adminRefTitle.textContent = CATEGORY_LABELS[key];
  dom.adminRefCount.textContent = String(urls.length);
  dom.adminRefList.innerHTML = urls.map((url, index) => `
    <article class="admin-ref-item">
      <img src="${escapeHtml(url)}" alt="${CATEGORY_LABELS[key]} 参考图 ${index + 1}" loading="lazy" />
      <div title="${escapeHtml(url)}">${escapeHtml(url)}</div>
      <button type="button" data-ref-index="${index}" aria-label="删除参考图">×</button>
    </article>
  `).join("");
}

function addAdminRef() {
  const url = dom.adminRefUrlInput.value.trim();
  if (!url || !CATEGORY_KEYS.includes(state.activeAdminTab)) return;
  if (!/^https?:\/\//i.test(url)) {
    alert("请输入有效的图片 URL");
    return;
  }
  state.settings.refUrls[state.activeAdminTab].unshift(url);
  state.refQueues[state.activeAdminTab] = [];
  dom.adminRefUrlInput.value = "";
  persistSettings();
  renderAdminRefs();
}

function removeAdminRef(index) {
  if (!CATEGORY_KEYS.includes(state.activeAdminTab)) return;
  state.settings.refUrls[state.activeAdminTab].splice(index, 1);
  state.refQueues[state.activeAdminTab] = [];
  persistSettings();
  renderAdminRefs();
}

function setupAdminTabs() {
  document.querySelectorAll(".admin-tab").forEach((button) => {
    button.addEventListener("click", () => switchAdminTab(button.dataset.tab));
  });
}

function openNativeFilePicker(input) {
  if (!input) return;
  input.value = "";
  try {
    if (typeof input.showPicker === "function") {
      input.showPicker();
      return;
    }
  } catch (error) {
    console.warn("showPicker 不可用，回退到 click。", error);
  }
  input.click();
}

function markImportTarget(target) {
  state.importTarget = target === "reference" ? "reference" : "main";
}

async function importPastedImages(event) {
  const items = [...(event.clipboardData?.items || [])];
  const files = items
    .filter((item) => item.kind === "file" && item.type.startsWith("image/"))
    .map((item) => item.getAsFile())
    .filter(Boolean);
  if (!files.length) return;

  event.preventDefault();
  if (state.importTarget === "reference") {
    await addTargetReferences(files);
    return;
  }
  await addFiles(files);
}

function bindEvents() {
  dom.fileInput.addEventListener("click", () => {
    markImportTarget("main");
    dom.fileInput.value = "";
  });
  dom.referenceInput.addEventListener("click", () => {
    markImportTarget("reference");
    dom.referenceInput.value = "";
  });
  dom.fileInput.addEventListener("change", (event) => addFiles(event.target.files));
  dom.referenceInput.addEventListener("change", (event) => addTargetReferences(event.target.files));
  dom.dropzone.addEventListener("pointerenter", () => markImportTarget("main"));
  dom.referenceDropzone.addEventListener("pointerenter", () => markImportTarget("reference"));
  dom.dropzone.addEventListener("focus", () => markImportTarget("main"));
  dom.referenceDropzone.addEventListener("focus", () => markImportTarget("reference"));
  dom.dropzone.addEventListener("keydown", (event) => {
    if (event.key !== "Enter" && event.key !== " ") return;
    event.preventDefault();
    markImportTarget("main");
    openNativeFilePicker(dom.fileInput);
  });
  dom.referenceDropzone.addEventListener("keydown", (event) => {
    if (event.key !== "Enter" && event.key !== " ") return;
    event.preventDefault();
    markImportTarget("reference");
    openNativeFilePicker(dom.referenceInput);
  });
  dom.referencePreview.addEventListener("click", (event) => {
    const removeButton = event.target.closest("[data-reference-remove]");
    if (removeButton) {
      event.stopPropagation();
      removeTargetReference(removeButton.dataset.referenceRemove);
      return;
    }
    const referenceItem = event.target.closest("[data-reference-id]");
    if (referenceItem) selectTargetReference(referenceItem.dataset.referenceId);
  });
  dom.referencePreview.addEventListener("keydown", (event) => {
    if (event.key !== "Enter" && event.key !== " ") return;
    if (event.target.closest("[data-reference-remove]")) return;
    const referenceItem = event.target.closest("[data-reference-id]");
    if (!referenceItem) return;
    event.preventDefault();
    selectTargetReference(referenceItem.dataset.referenceId);
  });
  dom.enginePicker?.addEventListener("click", (event) => {
    const button = event.target.closest("[data-engine]");
    if (!button) return;
    setGenerationEngine(button.dataset.engine);
  });
  dom.ratioPicker.addEventListener("click", (event) => {
    const button = event.target.closest("[data-ratio]");
    if (!button) return;
    setAspectRatio(button.dataset.ratio);
  });
  dom.generateBtn.addEventListener("click", generateAll);
  dom.seriesBtn.addEventListener("click", generateSeriesAll);
  dom.downloadAllBtn.addEventListener("click", downloadAll);
  dom.cutoutAllBtn?.addEventListener("click", cutoutAll);
  dom.previewClose.addEventListener("click", closePreview);
  dom.previewPrev.addEventListener("click", () => stepPreview(-1));
  dom.previewNext.addEventListener("click", () => stepPreview(1));
  dom.previewRegenerate?.addEventListener("click", regenerateCurrentPreviewVariant);
  dom.previewOverlay.addEventListener("click", (event) => {
    if (event.target === dom.previewOverlay) closePreview();
  });
  dom.clearBtn.addEventListener("click", () => {
    state.items.forEach(disposeItem);
    state.items = [];
    setTask("待机", 0, 0);
    render();
  });

  dom.dropzone.addEventListener("dragover", (event) => {
    event.preventDefault();
    dom.dropzone.classList.add("is-dragover");
  });
  dom.dropzone.addEventListener("dragleave", () => dom.dropzone.classList.remove("is-dragover"));
  dom.dropzone.addEventListener("drop", (event) => {
    event.preventDefault();
    dom.dropzone.classList.remove("is-dragover");
    addFiles(event.dataTransfer.files);
  });

  dom.referenceDropzone.addEventListener("dragover", (event) => {
    event.preventDefault();
    dom.referenceDropzone.classList.add("is-dragover");
  });
  dom.referenceDropzone.addEventListener("dragleave", () => dom.referenceDropzone.classList.remove("is-dragover"));
  dom.referenceDropzone.addEventListener("drop", (event) => {
    event.preventDefault();
    dom.referenceDropzone.classList.remove("is-dragover");
    addTargetReferences(event.dataTransfer.files);
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && dom.adminOverlay.classList.contains("is-open")) {
      closeAdmin();
      return;
    }
    if (event.key === "Escape" && dom.previewOverlay.classList.contains("is-open")) {
      closePreview();
      return;
    }
    if (dom.previewOverlay.classList.contains("is-open") && event.key === "ArrowLeft") {
      stepPreview(-1);
      return;
    }
    if (dom.previewOverlay.classList.contains("is-open") && event.key === "ArrowRight") {
      stepPreview(1);
      return;
    }
    if (event.key !== "Shift") return;
    state.shiftCount += 1;
    window.clearTimeout(state.shiftTimer);
    state.shiftTimer = window.setTimeout(() => {
      state.shiftCount = 0;
    }, 1500);
    if (state.shiftCount >= 5) {
      state.shiftCount = 0;
      openAdmin();
    }
  });
  document.addEventListener("paste", importPastedImages);
  document.addEventListener("dragstart", (event) => {
    if (event.target instanceof HTMLImageElement) event.preventDefault();
  });
  document.addEventListener("selectstart", (event) => {
    const target = event.target;
    const canSelectText =
      target instanceof HTMLInputElement ||
      target instanceof HTMLTextAreaElement ||
      target instanceof HTMLSelectElement ||
      target?.isContentEditable;
    if (!canSelectText) event.preventDefault();
  });

  dom.adminClose.addEventListener("click", closeAdmin);
  dom.adminLoginBtn.addEventListener("click", enterAdmin);
  dom.adminPassword.addEventListener("keydown", (event) => {
    if (event.key === "Enter") enterAdmin();
  });
  dom.adminOverlay.addEventListener("click", (event) => {
    if (event.target === dom.adminOverlay) closeAdmin();
  });
  dom.saveSettingsBtn.addEventListener("click", saveAdmin);
  dom.resetSettingsBtn.addEventListener("click", resetAdmin);
  dom.adminAddRefBtn.addEventListener("click", addAdminRef);
  dom.adminRefUrlInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") addAdminRef();
  });
  dom.adminRefList.addEventListener("click", (event) => {
    const button = event.target.closest("[data-ref-index]");
    if (!button) return;
    removeAdminRef(Number(button.dataset.refIndex));
  });
  setupAdminTabs();
}

function initEntryGate() {
  const gate = document.querySelector("#entryGate");
  if (!gate) return;
  const input = document.querySelector("#entryPassword");
  const error = document.querySelector("#entryError");
  const submit = document.querySelector("#entrySubmit");

  // 每次进入工具都必须输入密码，不记住（公网防盗用）
  function attempt() {
    if (input.value === ENTRY_PASSWORD) {
      error.classList.remove("is-visible");
      gate.classList.add("is-hidden");
    } else {
      error.classList.add("is-visible");
      input.value = "";
      input.focus();
    }
  }

  submit.addEventListener("click", attempt);
  input.addEventListener("keydown", (event) => {
    event.stopPropagation();
    if (event.key === "Enter") {
      event.preventDefault();
      attempt();
    } else {
      error.classList.remove("is-visible");
    }
  });
  window.setTimeout(() => input.focus(), 60);
}
